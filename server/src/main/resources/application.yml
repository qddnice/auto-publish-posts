server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: auto-publish-posts
  datasource:
    url: jdbc:postgresql://127.0.0.1:${DB_PORT}/${DB}?currentSchema=public
    username: ${DB_USER}
    password: ${DB_PWD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 127.0.0.1
      port: ${REDIS_PORT}
  flyway:
    enabled: true
    schemas: dev
    default-schema: dev
    create-schemas: true
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  security:
    jwt-secret: "auto-publish-posts-local-jwt-secret-please-change-32"
    jwt-expires-seconds: 86400
  platform:
    tt-messaging-enabled: false
